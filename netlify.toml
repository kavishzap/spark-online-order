[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[redirects]]
  from = "http://sparkmauritius.com/*"
  to = "https://sparkmauritius.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.sparkmauritius.com/*"
  to = "https://sparkmauritius.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.sparkmauritius.com/*"
  to = "https://sparkmauritius.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
